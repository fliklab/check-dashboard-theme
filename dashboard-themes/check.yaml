name: check
label: CHECK
description: Portable CHECK YAML theme — modern restrained SaaS dashboard implemented with tokens plus inline customCSS only.
palette:
  background:
    hex: '#f6f8fb'
    alpha: 1
  midground:
    hex: '#111827'
    alpha: 1
  foreground:
    hex: '#ffffff'
    alpha: 0
  warmGlow: rgba(255, 255, 255, 0)
  noiseOpacity: 0
typography:
  fontSans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif
  fontMono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace
  fontDisplay: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif
  baseSize: 15px
  lineHeight: '1.5'
  letterSpacing: '0'
layout:
  radius: 0.75rem
  density: comfortable
layoutVariant: standard
terminalBackground: '#111827'
componentStyles:
  backdrop:
    bgBlendMode: normal
    fillerBlendMode: normal
    fillerOpacity: '0'
  header:
    background: rgba(255, 255, 255, 0.92)
    borderColor: '#dde5ef'
    boxShadow: none
  sidebar:
    background: rgba(255, 255, 255, 0.97)
    borderColor: '#e5eaf1'
    boxShadow: none
  card:
    background: rgba(255, 255, 255, 0.96)
    borderColor: '#e1e7ef'
    boxShadow: none
colorOverrides:
  card: '#ffffff'
  cardForeground: '#111827'
  popover: '#ffffff'
  popoverForeground: '#111827'
  primary: '#2563eb'
  primaryForeground: '#ffffff'
  secondary: '#f3f6fa'
  secondaryForeground: '#111827'
  muted: '#eef2f7'
  mutedForeground: '#4b5563'
  accent: '#e8edf4'
  accentForeground: '#111827'
  destructive: '#dc2626'
  destructiveForeground: '#ffffff'
  success: '#15803d'
  warning: '#b45309'
  border: '#d4dde8'
  input: '#d4dde8'
  ring: '#2563eb'
customCSS: |
  /* Source-to-YAML migration: keep CHECK portable without dashboard source patches. */
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a > span.absolute,
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a > span.pointer-events-none,
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a > span[style*="plus-lighter"],
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar [role="button"] > span.absolute,
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar [role="button"] > span.pointer-events-none,
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar [role="button"] > span[style*="plus-lighter"] {
    display: none !important;
    opacity: 0 !important;
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    mix-blend-mode: normal !important;
  }

  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a,
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar [role="button"] {
    border-radius: 0.875rem !important;
    background-clip: padding-box !important;
  }

  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a:hover,
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a[aria-current="page"],
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a[aria-selected="true"],
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a[class*="bg-"] {
    background: #eef2f7 !important;
    color: #111827 !important;
    border-color: transparent !important;
    box-shadow: none !important;
  }

  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a[aria-current="page"],
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a[aria-selected="true"],
  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a[class*="bg-midground"] {
    background: #e2e8f0 !important;
    color: #0f172a !important;
  }

  :is([data-theme="check"], html:not([data-theme])) :is([class*="text-amber"], [class*="text-yellow"]):not([class*="bg-"]) {
    color: var(--check-warning, #92400e) !important;
  }

  :is([data-theme="check"], html:not([data-theme])) :is([class*="border-amber"], [class*="border-yellow"]) {
    border-color: #fdba74 !important;
  }

  :is([data-theme="check"], html:not([data-theme])) :is([class*="bg-amber"], [class*="bg-yellow"]) {
    background-color: var(--check-warning-soft, #ffedd5) !important;
  }

  :is([data-theme="check"], html:not([data-theme])) :is(header, main, #app-sidebar, aside, [class*="bg-card"], [class*="bg-background-base"]) {
    transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease !important;
  }

  [data-theme="check"] {
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mondwest: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-rules-expanded: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-rules-compressed: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --theme-font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --theme-font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --check-canvas: #f6f8fb;
    --check-canvas-soft: #f8fafc;
    --check-surface: #ffffff;
    --check-surface-raised: rgba(255, 255, 255, 0.96);
    --check-surface-muted: #f1f5f9;
    --check-border: #d8e1ec;
    --check-border-strong: #c7d2df;
    --check-text: #111827;
    --check-text-soft: #374151;
    --check-muted: #64748b;
    --check-primary: #2563eb;
    --check-primary-soft: #dbeafe;
    --check-primary-softer: #eff6ff;
    --check-success: #166534;
    --check-success-soft: #dcfce7;
    --check-warning: #92400e;
    --check-warning-soft: #ffedd5;
    --check-danger: #b91c1c;
    --check-danger-soft: #fee2e2;
    --check-radius-card: 0.75rem;
    --check-radius-control: 0.625rem;
    --check-radius-pill: 999px;
    --check-shadow-hairline: 0 1px 0 rgba(15, 23, 42, 0.04);
    --check-shadow-card: 0 1px 2px rgba(15, 23, 42, 0.05);
    background: var(--check-canvas) !important;
    color: var(--check-text) !important;
  }



  /* CHECK critical portable import fixes: keep before API customCSS truncation. */
  :is([data-theme="check"], html:not([data-theme])) ::selection {
    background: #bfdbfe !important;
    color: #0f172a !important;
    text-shadow: none !important;
  }

  :is([data-theme="check"], html:not([data-theme])) ::-moz-selection {
    background: #bfdbfe !important;
    color: #0f172a !important;
    text-shadow: none !important;
  }

  :is([data-theme="check"], html:not([data-theme])) :is(.arc-border, .arc-border::before, .arc-border::after),
  :is([data-theme="check"], html:not([data-theme])) :is(button, [role="button"], a, [role="tab"], [role="radio"], [role="switch"]) :is(.arc-border, .arc-border::before, .arc-border::after),
  :is([data-theme="check"], html:not([data-theme])) :is([class*="group-hover"], [class*="hover:shadow"], [class*="shadow-"]):is(:hover, :focus, :focus-visible, :active) {
    animation: none !important;
    background-image: none !important;
    box-shadow: none !important;
    filter: none !important;
    opacity: 0 !important;
    text-shadow: none !important;
  }

  :is([data-theme="check"], html:not([data-theme])) :is(button, [role="button"], a[href], [role="tab"], [role="radio"], [role="switch"], summary, select):is(:hover, :focus, :focus-visible, :active):not(:disabled) {
    box-shadow: none !important;
    filter: none !important;
    text-shadow: none !important;
    background-image: none !important;
  }

  :is([data-theme="check"], html:not([data-theme])) :is(button, [role="button"], [role="tab"], [role="radio"], [role="switch"], select):hover:not(:disabled) {
    background-color: #f1f5f9 !important;
    border-color: #cbd5e1 !important;
  }

  :is([data-theme="check"], html:not([data-theme])) a[href]:hover {
    background-color: #eef2f7 !important;
    border-color: transparent !important;
    box-shadow: none !important;
    filter: none !important;
  }

  :is([data-theme="check"], html:not([data-theme])) :is(button, [role="button"], a[href], [role="tab"], [role="radio"], [role="switch"]):is(:hover, :focus, :focus-visible, :active)::before,
  :is([data-theme="check"], html:not([data-theme])) :is(button, [role="button"], a[href], [role="tab"], [role="radio"], [role="switch"]):is(:hover, :focus, :focus-visible, :active)::after {
    animation: none !important;
    background-image: none !important;
    box-shadow: none !important;
    filter: none !important;
    opacity: 0 !important;
  }

  :is([data-theme="check"], html:not([data-theme])) :is(.shadow, .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl, .shadow-2xl, [class*="shadow-"]):is(:hover, :focus, :focus-visible, :active) {
    --tw-shadow: 0 0 #0000 !important;
    --tw-shadow-colored: 0 0 #0000 !important;
    box-shadow: none !important;
  }

  :is([data-theme="check"], html:not([data-theme])) main :is(div, button)[class*="grid"][class*="grid-cols-"][class*="border-b"],
  :is([data-theme="check"], html:not([data-theme])) main .overflow-x-auto > :is(div, button)[class*="grid"],
  :is([data-theme="check"], html:not([data-theme])) main .overflow-x-auto :is(button, div)[class*="grid"][class*="hover:bg"],
  :is([data-theme="check"], html:not([data-theme])) main :is(div, button)[class*="min-w-[42rem]"] {
    border-radius: 0 !important;
    box-shadow: none !important;
  }

  :is([data-theme="check"], html:not([data-theme])) main :is(button, [role="switch"])[role="switch"],
  :is([data-theme="check"], html:not([data-theme])) main button[aria-checked="true"],
  :is([data-theme="check"], html:not([data-theme])) main button[aria-checked="false"] {
    border-radius: 999px !important;
    overflow: hidden !important;
  }

  :is([data-theme="check"], html:not([data-theme])) main .relative.ml-auto,
  :is([data-theme="check"], html:not([data-theme])) main .relative:has(> button[aria-haspopup]),
  :is([data-theme="check"], html:not([data-theme])) main .relative:has(> button[aria-expanded]) {
    overflow: visible !important;
    z-index: 60 !important;
  }

  :is([data-theme="check"], html:not([data-theme])) main :is([role="listbox"], [role="menu"], [data-radix-popper-content-wrapper], [data-state="open"]),
  :is([data-theme="check"], html:not([data-theme])) main .relative > :is(div, ul)[class*="absolute"],
  :is([data-theme="check"], html:not([data-theme])) main .relative > :is(div, ul)[class*="top-full"] {
    z-index: 9999 !important;
    overflow: visible !important;
    background: #ffffff !important;
    border: 1px solid #cbd5e1 !important;
    box-shadow: 0 8px 18px rgba(15, 23, 42, 0.10) !important;
  }

  :is([data-theme="check"], html:not([data-theme])) #app-sidebar nav a {
    width: calc(100% - 1rem) !important;
    margin-left: 0.5rem !important;
    margin-right: 0.5rem !important;
    box-sizing: border-box !important;
  }
  [data-theme="check"],
  [data-theme="check"] body,
  [data-theme="check"] #root {
    background: linear-gradient(180deg, #f8fafc 0%, var(--check-canvas) 46%, #f2f6fb 100%) !important;
    color: var(--check-text) !important;
  }

  [data-theme="check"] *,
  [data-theme="check"] *::before,
  [data-theme="check"] *::after {
    letter-spacing: normal !important;
    font-stretch: normal !important;
    font-variant-ligatures: normal !important;
    font-variant-caps: normal !important;
    text-rendering: optimizeLegibility;
  }

  [data-theme="check"],
  [data-theme="check"] body,
  [data-theme="check"] #root,
  [data-theme="check"] #app-sidebar,
  [data-theme="check"] main,
  [data-theme="check"] .font-sans,
  [data-theme="check"] .font-mondwest,
  [data-theme="check"] .font-expanded,
  [data-theme="check"] .font-compressed,
  [data-theme="check"] .text-display,
  [data-theme="check"] :is(h1, h2, h3, h4, h5, h6, p, a, button, input, select, textarea, label, summary, li, span, div):not(pre *):not(code):not(code *):not(kbd):not(samp) {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
    font-stretch: normal !important;
    letter-spacing: normal !important;
    text-transform: none;
  }

  [data-theme="check"] :is(.font-mono, .font-courier):not(pre):not(pre *):not(code):not(code *):not(kbd):not(samp),
  [data-theme="check"] :is(button, a, summary, select, input, textarea)[class*="font-mono"] {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
    letter-spacing: normal !important;
  }

  [data-theme="check"] code,
  [data-theme="check"] pre,
  [data-theme="check"] pre *,
  [data-theme="check"] kbd,
  [data-theme="check"] samp {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace !important;
  }

  [data-theme="check"] header,
  [data-theme="check"] .sticky.top-0 {
    background: rgba(255, 255, 255, 0.92) !important;
    border-bottom-color: var(--check-border) !important;
    box-shadow: none !important;
    backdrop-filter: saturate(1.12) blur(14px) !important;
  }

  [data-theme="check"] header h1,
  [data-theme="check"] header .text-midground,
  [data-theme="check"] #app-sidebar .text-midground,
  [data-theme="check"] #app-sidebar .text-foreground,
  [data-theme="check"] #app-sidebar .text-background,
  [data-theme="check"] #app-sidebar [class*="text-midground"],
  [data-theme="check"] #app-sidebar [class*="text-foreground"],
  [data-theme="check"] #app-sidebar [class*="text-background"] {
    color: var(--check-text) !important;
    mix-blend-mode: normal !important;
    font-weight: 700 !important;
    text-shadow: none !important;
  }

  [data-theme="check"] #app-sidebar > div:first-child,
  [data-theme="check"] #app-sidebar > div:first-child *,
  [data-theme="check"] #app-sidebar span[class*="uppercase"],
  [data-theme="check"] #app-sidebar span[class*="text-"][class*="uppercase"] {
    color: #111827 !important;
    opacity: 1 !important;
    mix-blend-mode: normal !important;
    text-shadow: none !important;
    -webkit-text-fill-color: #111827 !important;
  }

  /* Critical readability fixes for portable CHECK installs. */
  [data-theme="check"] #app-sidebar > div:first-child span,
  [data-theme="check"] #app-sidebar > div:first-child [class*="text-"],
  [data-theme="check"] #app-sidebar [aria-label*="Hermes"],
  [data-theme="check"] #app-sidebar [aria-label*="Agent"] {
    color: #0f172a !important;
    -webkit-text-fill-color: #0f172a !important;
    opacity: 1 !important;
    mix-blend-mode: normal !important;
    filter: none !important;
    text-shadow: none !important;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
    font-size: 1.125rem !important;
    font-weight: 800 !important;
    line-height: 0.98 !important;
    letter-spacing: 0.015em !important;
    text-transform: uppercase !important;
  }

  [data-theme="check"] main :is(span, code, a, button)[class*="bg-success"],
  [data-theme="check"] main :is(span, code, a, button)[class*="bg-warning"],
  [data-theme="check"] main :is(span, code, a, button)[class*="bg-primary"],
  [data-theme="check"] main :is(span, code, a, button)[class*="bg-blue"],
  [data-theme="check"] main :is(span, code, a, button)[class*="bg-purple"],
  [data-theme="check"] main :is(span, code, a, button)[class*="bg-muted"],
  [data-theme="check"] main :is(span, code, a, button)[class*="border-success"],
  [data-theme="check"] main :is(span, code, a, button)[class*="border-warning"],
  [data-theme="check"] main :is(span, code, a, button)[class*="border-amber"],
  [data-theme="check"] main :is(span, code, a, button)[class*="border-yellow"],
  [data-theme="check"] main :is(span, code, a, button)[class*="border-midground"],
  [data-theme="check"] main [class*="badge"],
  [data-theme="check"] main [class*="Badge"] {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
    font-stretch: normal !important;
    font-variant: normal !important;
    letter-spacing: normal !important;
    text-transform: none !important;
    line-height: 1.25 !important;
    min-width: auto !important;
    white-space: nowrap !important;
  }

  [data-theme="check"] main :is(span, code, a)[class*="bg-success"],
  [data-theme="check"] main :is(span, code, a)[class*="border-success"] {
    background: #ecfdf5 !important;
    border: 1px solid #a7f3d0 !important;
    color: #047857 !important;
  }

  [data-theme="check"] main :is(span, code, a)[class*="bg-warning"],
  [data-theme="check"] main :is(span, code, a)[class*="bg-amber"],
  [data-theme="check"] main :is(span, code, a)[class*="bg-yellow"],
  [data-theme="check"] main :is(span, code, a)[class*="border-warning"],
  [data-theme="check"] main :is(span, code, a)[class*="border-amber"],
  [data-theme="check"] main :is(span, code, a)[class*="border-yellow"] {
    background: #fff7ed !important;
    border: 1px solid #fed7aa !important;
    color: #9a3412 !important;
  }

  [data-theme="check"] main :is(code, a, span).font-mono,
  [data-theme="check"] main :is(code, a, span).font-courier,
  [data-theme="check"] main :is(code, a, span)[class*="font-mono"],
  [data-theme="check"] main :is(code, a, span)[class*="font-courier"],
  [data-theme="check"] main :is(code, a, span)[class*="bg-primary/10"],
  [data-theme="check"] main :is(code, a, span)[class*="bg-sky"],
  [data-theme="check"] main :is(code, a, span)[class*="bg-cyan"] {
    background: #eef4ff !important;
    border: 1px solid #bfdbfe !important;
    border-radius: 0.375rem !important;
    color: #1e3a8a !important;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
    font-size: 0.875rem !important;
    font-stretch: normal !important;
    font-weight: 600 !important;
    letter-spacing: normal !important;
    line-height: 1.35 !important;
    padding: 0.075rem 0.35rem !important;
    text-decoration: none !important;
    text-transform: none !important;
    word-break: break-word !important;
  }

  [data-theme="check"] main,
  [data-theme="check"] main > div {
    background: transparent !important;
  }

  [data-theme="check"] #app-sidebar {
    background: rgba(255, 255, 255, 0.97) !important;
    border-right: 1px solid var(--check-border) !important;
    color: var(--check-text) !important;
    box-shadow: none !important;
    backdrop-filter: saturate(1.08) blur(12px) !important;
  }

  [data-theme="check"] #app-sidebar nav a,
  [data-theme="check"] #app-sidebar a,
  [data-theme="check"] #app-sidebar button,
  [data-theme="check"] #app-sidebar select {
    border-radius: 0.875rem !important;
    color: var(--check-text-soft) !important;
    font-weight: 700 !important;
    box-shadow: none !important;
  }

  [data-theme="check"] #app-sidebar nav a {
    border-color: transparent !important;
    outline: none !important;
    transition: background-color 140ms ease, color 140ms ease, border-color 140ms ease !important;
  }

  [data-theme="check"] #app-sidebar nav a:hover {
    background: #eef2f7 !important;
    color: #1f2937 !important;
    border-color: transparent !important;
    box-shadow: none !important;
  }

  [data-theme="check"] #app-sidebar nav a[aria-current="page"],
  [data-theme="check"] #app-sidebar nav a[aria-selected="true"],
  [data-theme="check"] #app-sidebar nav a[class*="bg-"] {
    background: #e6eaf0 !important;
    color: #1f2937 !important;
    border-color: transparent !important;
    box-shadow: none !important;
  }

  [data-theme="check"] #app-sidebar nav a > span.absolute,
  [data-theme="check"] #app-sidebar nav a > span.pointer-events-none,
  [data-theme="check"] #app-sidebar nav a > span[class*="group-hover"],
  [data-theme="check"] #app-sidebar nav a > span[class*="bg-midground"] {
    display: none !important;
    opacity: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
  }

  [data-theme="check"] .bg-card,
  [data-theme="check"] [class*="bg-card"],
  [data-theme="check"] [class*="bg-background-base/40"],
  [data-theme="check"] [class*="bg-background-base/50"],
  [data-theme="check"] [class*="bg-background-base/80"],
  [data-theme="check"] [class*="border-border"],
  [data-theme="check"] [class*="border-muted"] {
    background: var(--check-surface-raised) !important;
    border-color: var(--check-border) !important;
    border-radius: var(--check-radius-card) !important;
    box-shadow: none !important;
  }

  [data-theme="check"] :is(.bg-card, [class*="bg-card"]):hover {
    box-shadow: var(--check-shadow-card) !important;
  }

  [data-theme="check"] input,
  [data-theme="check"] textarea,
  [data-theme="check"] select {
    background: #ffffff !important;
    border-color: var(--check-border-strong) !important;
    border-radius: var(--check-radius-control) !important;
    color: var(--check-text) !important;
    box-shadow: var(--check-shadow-hairline) !important;
  }

  [data-theme="check"] input::placeholder,
  [data-theme="check"] textarea::placeholder {
    color: #94a3b8 !important;
  }

  [data-theme="check"] :is(
    a[href],
    button:not(:disabled),
    select:not(:disabled),
    summary,
    [role="button"],
    [role="link"],
    [role="menuitem"],
    [role="option"],
    [role="tab"],
    [role="radio"],
    [role="checkbox"],
    [role="switch"],
    [aria-controls],
    [aria-expanded],
    [aria-pressed],
    [aria-selected],
    .cursor-pointer
  ) {
    cursor: pointer !important;
  }

  [data-theme="check"] :is(button:disabled, [aria-disabled="true"]) {
    cursor: not-allowed !important;
    opacity: 0.58 !important;
  }

  [data-theme="check"] :is(button, [role="button"], [role="tab"], [role="radio"], select, input, textarea) {
    border-radius: var(--check-radius-control) !important;
    box-shadow: none !important;
    filter: none !important;
  }

  [data-theme="check"] :is(button, [role="button"], [role="tab"], [role="radio"]):not(:disabled) {
